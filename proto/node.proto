syntax = "proto3";
package node;

// Request Types

message CreateAccount {
  string public_key = 1;
}

message Bid {
  string auction_id = 1;
  string from = 2;
  uint64 amount = 3;
}

message CreateAuction {
  string auction_id = 1;
  string from = 2;
  uint64 start_amount = 3;
  uint64 stop_time = 4;
}

message StopAuction {
  string auction_id = 1;
}

message TransactionRequest {
  oneof record {
    CreateAccount create_account_request = 1;
    Bid bid_request = 2;
    CreateAuction create_auction_request = 3;
    StopAuction stop_auction_request = 4;
  }
  string signature = 5;
  string from = 6;
}

message BlockInfoRequest {
  string hash = 1;
}

message LongestChainRequest {}

// Response Types

enum RequestStatus {
  SUCCESSFUL = 0;
  FAILED = 1;
}

message TransactionResponse {
  RequestStatus status = 1;
}

message Transaction {
  string id = 1;
  oneof record {
    CreateAccount create_account_request = 2;
    Bid bid_request = 3;
    CreateAuction create_auction_request = 4;
    StopAuction stop_auction_request = 5;
  }
  string from = 6;
  uint64 timestamp = 7;
  uint32 nonce = 8;
  string signature = 9;
}

message Block {
  string previous_hash = 1;
  repeated Transaction transactions = 2;
  string merkle_root = 3;
  string hash = 4;
  uint32 nonce = 5;
  uint64 timestamp = 6;
  string miner = 7;
}

message BlockInfoResponse {
  RequestStatus status = 1;
  optional Block block = 2;
  optional string next_block_hash = 3;
}

message LongestChainResponse {
  RequestStatus status = 1;
  repeated string longest_chain = 2;
}

service NodeRpcService {
  rpc Transaction(TransactionRequest) returns (TransactionResponse);
  rpc BlockInfo(BlockInfoRequest) returns (BlockInfoResponse);
  rpc LongestChain(LongestChainRequest) returns (LongestChainResponse);
}
