syntax = "proto3";
package node;

// Request Types

message Account {
  string public_key = 1;
}

message Bid {
  string auction_id = 1;
  uint64 amount = 2;
}

message CreateAuction {
  string auction_id = 1;
  uint64 start_amount = 2;
  uint64 stop_time = 3;
}

message StopAuction {
  string auction_id = 1;
}

message TransactionRequest {
  oneof record {
    Account create_account_request = 1;
    Bid bid_request = 2;
    CreateAuction create_auction_request = 3;
    StopAuction stop_auction_request = 4;
  }

  string signature = 5;
  string from = 6;
  uint32 nonce = 7;
}

message BlockInfoRequest {
  string hash = 1;
}

message AccountExistsRequest {
  Account account = 1;
}

message AuctionExistsRequest {
  string auction_id = 1;
}

// Response Types

enum RequestStatus {
  SUCCESSFUL = 0;
  FAILED = 1;
}

message TransactionResponse {
  RequestStatus status = 1;
}

message Transaction {
  string id = 1;
  oneof record {
    Account create_account_request = 2;
    Bid bid_request = 3;
    CreateAuction create_auction_request = 4;
    StopAuction stop_auction_request = 5;
  }
  string from = 6;
  uint64 timestamp = 7;
  uint32 nonce = 8;
  string signature = 9;
}

message Block {
  string previous_hash = 1;
  repeated Transaction transactions = 2;
  string merkle_root = 3;
  string hash = 4;
  uint32 nonce = 5;
  uint64 timestamp = 6;
  string miner = 7;
}

message BlockInfoResponse {
  RequestStatus status = 1;
  optional Block block = 2;
}

message AccountExistsResponse {
  RequestStatus status = 1;
  optional uint32 nonce = 3;
}

message AuctionExistsResponse {
  RequestStatus status = 1;
  optional string block_hash = 3;
}

service NodeRpcService {
  rpc Transaction(TransactionRequest) returns (TransactionResponse);
  rpc BlockInfo(BlockInfoRequest) returns (BlockInfoResponse);
  rpc AccountExists(AccountExistsRequest) returns (AccountExistsResponse);
  rpc AuctionExists(AuctionExistsRequest) returns (AuctionExistsResponse);
}
